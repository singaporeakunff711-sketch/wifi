<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Scanner (Simulasi)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .wifi-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .wifi-item:hover {
      background: #f0f8ff;
    }

    .password {
      background: #f9f9f9;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
      font-family: monospace;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #357abd;
    }

    @media (min-width: 600px) {
      .flex {
        display: flex;
        gap: 15px;
      }

      .flex .card {
        flex: 1;
      }
    }
  </style>
</head>
<body>

<header>📶 WiFi Scanner (Simulasi)</header>

<div class="container flex">

  <div class="card">
    <h3>Daftar WiFi</h3>
    <div id="wifiList"></div>
  </div>

  <div class="card">
    <h3>Detail</h3>
    <p id="selectedWifi">Pilih jaringan WiFi...</p>
    <div id="passwordList"></div>
    <button onclick="generatePasswords()">Generate Password</button>
  </div>

</div>

<script>
  const wifiData = [
    "Rumah_Tetangga",
    "WiFi_RT_07",
    "KopiGratis",
    "MyHome_5G",
    "Cafe_Santai"
  ];

  let selected = "";

  function renderWifiList() {
    const list = document.getElementById("wifiList");
    wifiData.forEach(name => {
      const div = document.createElement("div");
      div.className = "wifi-item";
      div.innerText = name;
      div.onclick = () => selectWifi(name);
      list.appendChild(div);
    });
  }

  function selectWifi(name) {
    selected = name;
    document.getElementById("selectedWifi").innerText = "Dipilih: " + name;
    generatePasswords();
  }

  function randomPassword() {
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let pass = "";
    for (let i = 0; i < 8 + Math.random()*4; i++) {
      pass += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return pass;
  }

  function generatePasswords() {
    if (!selected) return;

    const container = document.getElementById("passwordList");
    container.innerHTML = "";

    for (let i = 0; i < 5; i++) {
      const div = document.createElement("div");
      div.className = "password";
      div.innerText = randomPassword();
      container.appendChild(div);
    }
  }

  renderWifiList();
</script>

</body>
</html>
